<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>西湖一小段 建物所有權人分佈圖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1f2e;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none}
.hdr{width:100%;background:#0f1420;padding:11px 24px;border-bottom:1px solid #2a3554;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hdr-title{color:#e2e8f7;font-size:15px;font-weight:600;letter-spacing:.05em}
.hdr-sub{color:#6b7fa8;font-size:11px;margin-top:1px}
.toolbar{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s;font-family:inherit}
.btn-edit{background:#1a3a6e;color:#7eb3f5;border-color:#2d5299}
.btn-edit.on{background:#2563d4;color:#fff;border-color:#4a90e2}
.btn-save{background:#1a4a2e;color:#7af0b8;border-color:#27ae60}
.btn-save:hover{background:#1d8f45;color:#fff}
.edit-hint{color:#e8b840;font-size:11px;background:#2a1f00;border:1px solid #6a4a00;padding:4px 10px;border-radius:5px;display:none}
.edit-hint.on{display:block}

.wrap{position:relative;display:block;margin:16px;width:calc(100vw - 32px);max-width:1400px;line-height:0}
#map-img{display:block;width:100%;height:auto;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,.6)}

/* PIN */
.pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:20}
.pin.draggable{cursor:grab}
.pin.draggable:active{cursor:grabbing}
.pin.dragging .dot{
  box-shadow:0 0 0 3px #ffcc00,0 4px 20px rgba(0,0,0,.8)!important;
  background:#c47f00!important;border-color:#ffcc00!important
}
.dot{
  width:30px;height:30px;border-radius:50%;
  background:#1a4a8a;border:2.5px solid #5a9aee;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;color:#c8e0ff;
  box-shadow:0 2px 10px rgba(0,0,0,.6);
  transition:transform .12s,box-shadow .12s,background .12s;
  line-height:1;text-align:center;pointer-events:none;white-space:nowrap;
}
.pin:not(.draggable):hover .dot{transform:scale(1.2);background:#1e5ab0;box-shadow:0 4px 18px rgba(90,154,238,.5)}
.pin.active .dot{background:#2563d4;border-color:#90c4ff;transform:scale(1.15)}

/* POPUP */
.popup{
  display:none;position:absolute;
  background:#0c1428;border:1px solid #2d4a8a;
  border-radius:10px;padding:12px 14px;
  min-width:185px;max-width:230px;
  z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.85);
  pointer-events:none;bottom:38px;
}
.popup.show{display:block}
.popup-arrow{
  position:absolute;width:10px;height:10px;
  background:#0c1428;
  border-left:1px solid #2d4a8a;border-bottom:1px solid #2d4a8a;
  transform:rotate(-45deg);bottom:-6px;left:calc(50% - 5px);
}
.popup h3{color:#7eb3f5;font-size:11px;font-weight:700;letter-spacing:.04em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #1e3050}
.fl-row{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fl-row:last-child{border-bottom:none}
.fl-badge{min-width:24px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;flex-shrink:0;border-left:3px solid}
.fl-name{color:#c8d6f0;font-size:11px}
.f1{background:rgba(13,30,58,.95);border-color:#4a90e2;color:#90c4ff}
.f2{background:rgba(13,46,28,.95);border-color:#27ae60;color:#7af0b8}
.f3{background:rgba(46,28,13,.95);border-color:#e67e22;color:#ffb870}
.f4{background:rgba(42,13,58,.95);border-color:#9b59b6;color:#d090ff}
.f5{background:rgba(58,13,20,.95);border-color:#e74c3c;color:#ff9090}

/* 座標匯出框 */
#coords-box{
  display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(10,14,26,.97);border:1px solid #2d4a8a;
  border-radius:10px;padding:14px 18px;
  width:360px;z-index:400;
  box-shadow:0 8px 40px rgba(0,0,0,.9);
  backdrop-filter:blur(12px);
}
#coords-box.on{display:block}
#coords-box h4{color:#7eb3f5;font-size:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
#coords-box h4 span{color:#6b7fa8;font-size:10px;cursor:pointer;padding:2px 8px;border:1px solid #2a3554;border-radius:4px}
#coords-box h4 span:hover{color:#c8d6f0;border-color:#4a6090}
#coords-pre{
  font-size:9.5px;color:#8ab8d8;background:#080e1c;
  border:1px solid #1a2a50;border-radius:6px;
  padding:8px 10px;max-height:200px;overflow-y:auto;
  white-space:pre;font-family:monospace;
}
.copy-btn{
  margin-top:8px;width:100%;padding:6px;
  background:#1e3a6e;color:#7eb3f5;border:1px solid #2d5299;
  border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:background .15s;
}
.copy-btn:hover{background:#2563d4;color:#fff}
.copy-ok{color:#7af0b8;font-size:10px;text-align:center;margin-top:4px;display:none}

.legend{position:fixed;bottom:16px;right:16px;background:rgba(10,14,26,.93);border:1px solid #2a3554;border-radius:10px;padding:12px 16px;font-size:11px;backdrop-filter:blur(10px);z-index:50}
.legend h3{color:#c8d6f0;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.lg{display:flex;align-items:center;gap:7px;margin:4px 0;color:#8a9ec8}
.lg-d{width:12px;height:12px;border-radius:50%;border:2px solid}

#oc{display:none;position:fixed;inset:0;z-index:100}
#oc.on{display:block}
</style>
</head>

const FL   = ["","一","二","三","四","五"];
let editMode = false;
let dragging = null, dragOffX = 0, dragOffY = 0;

function build() {
  document.querySelectorAll(".pin").forEach(e=>e.remove());
  const wrap = document.getElementById("wrap");

  Object.entries(pos).forEach(([addr,[x,y]]) => {
    const floors = DATA[addr]; if(!floors) return;
    const num = addr.match(/(\d+)號$/)?.[1]||"?";

    const pin = document.createElement("div");
    pin.className = "pin"+(editMode?" draggable":"");
    pin.dataset.addr = addr;
    pin.style.left = x+"%";
    pin.style.top  = y+"%";

    const dot = document.createElement("div");
    dot.className = "dot";
    dot.textContent = num+"號";
    pin.appendChild(dot);

    // Popup
    const popup = document.createElement("div");
    popup.className = "popup";
    const goLeft = x > 55;
    popup.style.left      = goLeft ? "auto" : "50%";
    popup.style.right     = goLeft ? "0"    : "auto";
    if(!goLeft) popup.style.transform = "translateX(-50%)";

    const byFloor={};
    floors.forEach(e=>{ if(!byFloor[e.f]) byFloor[e.f]=[]; byFloor[e.f].push(e.o) });
    const sortedF = Object.keys(byFloor).map(Number).sort((a,b)=>a-b);
    let html = `<h3>內湖路一段 ${addr}</h3>`;
    sortedF.forEach(f=>{
      byFloor[f].forEach(o=>{
        html+=`<div class="fl-row"><div class="fl-badge f${f}">${FL[f]}F</div><div class="fl-name">${o}</div></div>`;
      });
    });
    html+=`<div class="popup-arrow"></div>`;
    popup.innerHTML = html;
    pin.appendChild(popup);

    if(editMode) {
      pin.addEventListener("mousedown",  startDrag);
      pin.addEventListener("touchstart", startDrag, {passive:false});
    } else {
      pin.addEventListener("click", e=>{
        e.stopPropagation();
        const isOpen = pin.classList.contains("active");
        closeAll();
        if(!isOpen){
          pin.classList.add("active");
          popup.classList.add("show");
          document.getElementById("oc").classList.add("on");
        }
      });
    }

    wrap.appendChild(pin);
  });
}

function startDrag(e) {
  e.preventDefault(); e.stopPropagation();
  dragging = e.currentTarget;
  dragging.classList.add("dragging");
  dragging.style.zIndex = 300;
  const wrap = document.getElementById("wrap");
  const wr = wrap.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const pinX = parseFloat(dragging.style.left)/100*wr.width  + wr.left;
  const pinY = parseFloat(dragging.style.top) /100*wr.height + wr.top;
  dragOffX = cx - pinX;
  dragOffY = cy - pinY;
}

function onMove(e) {
  if(!dragging) return;
  e.preventDefault();
  const wrap = document.getElementById("wrap");
  const wr = wrap.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  let nx = (cx - dragOffX - wr.left) / wr.width  * 100;
  let ny = (cy - dragOffY - wr.top)  / wr.height * 100;
  nx = Math.max(0,Math.min(100,nx));
  ny = Math.max(0,Math.min(100,ny));
  dragging.style.left = nx+"%";
  dragging.style.top  = ny+"%";
  pos[dragging.dataset.addr] = [Math.round(nx*10)/10, Math.round(ny*10)/10];
}

function endDrag() {
  if(!dragging) return;
  dragging.classList.remove("dragging");
  dragging.style.zIndex = 20;
  dragging = null;
}

document.addEventListener("mousemove", onMove);
document.addEventListener("mouseup",   endDrag);
document.addEventListener("touchmove", onMove, {passive:false});
document.addEventListener("touchend",  endDrag);

function toggleEdit() {
  editMode = !editMode;
  const btn  = document.getElementById("btn-edit");
  const hint = document.getElementById("edit-hint");
  btn.classList.toggle("on", editMode);
  hint.classList.toggle("on", editMode);
  btn.textContent = editMode ? "✎ 拖曳中（再按關閉）" : "✎ 拖曳調整位置";
  closeAll();
  build();
}

function closeAll() {
  document.querySelectorAll(".pin.active").forEach(p=>{
    p.classList.remove("active");
    p.querySelector(".popup")?.classList.remove("show");
  });
  document.getElementById("oc").classList.remove("on");
}

function showCoords() {
  const box = document.getElementById("coords-box");
  box.classList.add("on");
  let out = "";
  Object.entries(pos).forEach(([addr,[x,y]])=>{ out+=`"${addr}": [${x}, ${y}],\n` });
  document.getElementById("coords-pre").textContent = out;
}

function copyCoords() {
  navigator.clipboard.writeText(document.getElementById("coords-pre").textContent).then(()=>{
    const ok=document.getElementById("copy-ok");
    ok.style.display="block";
    setTimeout(()=>ok.style.display="none",2000);
  });
}

document.getElementById("oc").addEventListener("click", closeAll);

document.getElementById("map-img").addEventListener("load", build);
if(document.getElementById("map-img").complete) build();
let rt; window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(build,150)});
